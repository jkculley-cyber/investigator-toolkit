<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Investigation Toolkit</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/Investigator-AppIcon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Investigator" />
  <meta name="theme-color" content="#1A1A2E" />
  <meta name="description" content="Investigator Toolkit — Campus investigation case management for Texas K-12 administrators. Document incidents, gather evidence, interview witnesses, generate reports." />
  <style>
    /* Critical loading styles */
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; }
    #app-loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 1rem; }
    #app-loading .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #2A9D8F; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-loading">
      <div class="spinner"></div>
      <p style="color:#6b7280; font-size:0.875rem;">Loading Campus Investigation Toolkit...</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
